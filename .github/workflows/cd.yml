name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-demo
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Demo Server
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      DOMAIN: liwei.it.com
      SYNC_NGINX: 'true'
      SERVER_HOST: ${{ secrets.DEMO_SERVER_HOST }}
      SERVER_USER: ${{ secrets.DEMO_SERVER_USER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEMO_SERVER_SSH_KEY }}

      - name: Trust remote host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy release package
        run: pnpm deploy:release
