# =============================================================================
# Fullstack AI Platform - Nginx 演示部署配置模板
# 用途：
# 1. 同一域名同时托管管理端、手机端 H5 和 API
# 2. 根路径 / 对应管理端，/m/ 对应手机端 H5
# 3. 保留 IP 的 HTTP 访问，域名强制走 HTTPS
#
# 使用方式：
# 1. 通过 deploy/scripts/render-demo-nginx.sh 渲染占位符
# 2. 再把渲染结果同步到服务器 /etc/nginx/conf.d/
#
# 占位符：
# - __DOMAIN__       正式域名，例如 liwei.it.com
# - __SERVER_PATH__  项目部署路径，例如 /var/www/fullstack
# - __SSL_CERT__     SSL 证书 fullchain.pem
# - __SSL_KEY__      SSL 证书 privkey.pem
# =============================================================================

upstream fullstack_api {
    server 127.0.0.1:3334;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root __SERVER_PATH__/current/apps/admin/dist;
    index index.html;
    client_max_body_size 100m;

    location /api/ {
        proxy_pass http://fullstack_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /m {
        return 301 /m/;
    }

    location ^~ /m/ {
        alias __SERVER_PATH__/current/apps/mobile/dist-m/;
        index index.html;
        try_files $uri $uri/ /m/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name www.__DOMAIN__;
    return 301 https://__DOMAIN__$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;
    return 301 https://__DOMAIN__$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.__DOMAIN__;

    ssl_certificate __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://__DOMAIN__$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;
    root __SERVER_PATH__/current/apps/admin/dist;
    index index.html;
    client_max_body_size 100m;

    ssl_certificate __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://fullstack_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /m {
        return 301 /m/;
    }

    location ^~ /m/ {
        alias __SERVER_PATH__/current/apps/mobile/dist-m/;
        index index.html;
        try_files $uri $uri/ /m/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
