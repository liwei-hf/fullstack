# =============================================================================
# Fullstack AI Platform - Nginx 演示部署配置
# 部署建议：
# - 管理端：admin.example.com
# - 手机端 H5：m.example.com
# - API 统一通过 /api 反代到 NestJS
# - 适合单机 2C4G / 2C8G 演示环境
# =============================================================================

upstream fullstack_api {
    server 127.0.0.1:3334;
    keepalive 32;
}

server {
    listen 80;
    server_name admin.example.com;

    root /var/www/fullstack/apps/admin/dist;
    index index.html;

    client_max_body_size 100m;

    location /api/ {
        proxy_pass http://fullstack_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name m.example.com;

    root /var/www/fullstack/apps/mobile/dist;
    index index.html;

    client_max_body_size 100m;

    location /api/ {
        proxy_pass http://fullstack_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
